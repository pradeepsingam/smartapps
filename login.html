<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Smart App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: var(--bg-light); display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; }
        .auth-card {
            background: #fff;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .form-group { text-align: left; margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 500; font-size: 0.875rem; margin-bottom: 0.5rem; }
        .form-group input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; }
        .form-group input:focus { border-color: var(--primary-color); outline: none; }
    </style>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>

    <a href="index.html" class="logo" style="color: var(--text-dark); margin-bottom: 2rem;">
        <img src="assets/logo/SmartDigiSign_logo_color.png" alt="Smart App" style="height: 40px; width: auto;">
    </a>

    <div class="auth-card">
        <h2>Log In</h2>
        <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 2rem;">Welcome back to Smart App</p>
        
        <div class="form-group">
            <label>Work Email</label>
            <input type="email" placeholder="name@company.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••">
        </div>
        
        <button class="btn btn-primary" style="width: 100%;">Sign In</button>
        
        <p style="margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted);">
            Don't have an account? <a href="pricing.html" style="color: var(--primary-color); font-weight: 600;">Sign up</a>
        </p>
    </div>

</body>
</html>
